name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        # Remove lockfile + re-install to work around npm bug #4828.
        # The lockfile is generated on macOS (different optional platform deps
        # than Linux CI), so `npm ci` and even `npm install` with the existing
        # lockfile fail to pull @rollup/rollup-linux-x64-gnu. Fresh install.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Type check
        run: npm run typecheck -w voidforge-build

      - name: Run tests (root — includes pretest agent-ref + gate validators)
        run: npm test

  e2e:
    # Publish-gate alignment (field report #363 F4 / v23.14.0): the tag-push
    # publish gate must depend on the FULL validation suite — E2E + a11y — not
    # unit tests alone, or an a11y/e2e regression ships past a green unit gate
    # (the aria-required-children incident that motivated the rule). This
    # mirrors validate-branches.yml's e2e-tests job, which runs only on branch
    # pushes/PRs (not tags), so without this the e2e/a11y suite never gated publish.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        # Same npm bug #4828 workaround as the test job.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests (Playwright + axe-core a11y)
        run: npm run test:e2e

  publish-voidforge:
    needs: [test, e2e, publish-methodology]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # Remove lockfile + re-install to work around npm bug #4828.
        # The lockfile is generated on macOS (different optional platform deps
        # than Linux CI), so `npm ci` and even `npm install` with the existing
        # lockfile fail to pull @rollup/rollup-linux-x64-gnu. Fresh install.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Build
        run: npm run build -w voidforge-build

      - name: Check if version already published
        id: check-cli
        run: |
          VERSION=$(jq -r .version packages/voidforge/package.json)
          if npm view "voidforge-build@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
            echo "Already on npm: voidforge-build@${VERSION}. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish voidforge-build
        if: steps.check-cli.outputs.skip == 'false'
        run: npm publish -w packages/voidforge --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify voidforge-build on registry
        if: steps.check-cli.outputs.skip == 'false'
        run: |
          VERSION=$(jq -r .version packages/voidforge/package.json)
          for i in 1 2 3 4 5 6; do
            if npm view "voidforge-build@${VERSION}" version 2>/dev/null | grep -q "^${VERSION}$"; then
              echo "Verified voidforge-build@${VERSION}"; exit 0
            fi
            echo "Not visible yet (attempt $i/6); sleeping 10s"; sleep 10
          done
          echo "::error::voidforge-build@${VERSION} not visible after 60s"; exit 1
        timeout-minutes: 2

  publish-methodology:
    needs: [test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        # Remove lockfile + re-install to work around npm bug #4828.
        # The lockfile is generated on macOS (different optional platform deps
        # than Linux CI), so `npm ci` and even `npm install` with the existing
        # lockfile fail to pull @rollup/rollup-linux-x64-gnu. Fresh install.
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund

      - name: Prepack methodology
        run: npm run prepack -w packages/methodology

      - name: Check if version already published
        id: check-methodology
        run: |
          VERSION=$(jq -r .version packages/methodology/package.json)
          if npm view "voidforge-build-methodology@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
            echo "Already on npm: voidforge-build-methodology@${VERSION}. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish voidforge-build-methodology
        if: steps.check-methodology.outputs.skip == 'false'
        run: npm publish -w packages/methodology --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify voidforge-build-methodology on registry
        if: steps.check-methodology.outputs.skip == 'false'
        run: |
          VERSION=$(jq -r .version packages/methodology/package.json)
          for i in 1 2 3 4 5 6; do
            if npm view "voidforge-build-methodology@${VERSION}" version 2>/dev/null | grep -q "^${VERSION}$"; then
              echo "Verified voidforge-build-methodology@${VERSION}"; exit 0
            fi
            echo "Not visible yet (attempt $i/6); sleeping 10s"; sleep 10
          done
          echo "::error::voidforge-build-methodology@${VERSION} not visible after 60s"; exit 1
        timeout-minutes: 2

  recover-partial:
    needs: [publish-voidforge, publish-methodology]
    if: |
      always() &&
      (needs.publish-voidforge.result == 'failure') !=
      (needs.publish-methodology.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Deprecate orphan half
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CLI_RESULT: ${{ needs.publish-voidforge.result }}
          VERSION: ${{ github.ref_name }}
        run: |
          V=${VERSION#v}
          MSG="v${V} partial publish — sibling package failed; do not install"
          if [ "$CLI_RESULT" = "success" ]; then
            npm deprecate "voidforge-build@${V}" "$MSG"
          else
            npm deprecate "voidforge-build-methodology@${V}" "$MSG"
          fi
      - name: Fail the workflow
        run: exit 1
